services:
  mongo:
    image: mongo:6
    container_name: jat_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: jat_user
      MONGO_INITDB_ROOT_PASSWORD: jat_pass

  minio:
    image: minio/minio:latest
    container_name: jat_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  resume_parser:
    build: ./services/resume_parser
    container_name: jat_resume_parser
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: "mongodb://jat_user:jat_pass@mongo:27017/?authSource=admin"
      # MONGO_URL: "${MONGO_URL}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      # SUPABASE_URL: "${SUPABASE_URL}"
      # SUPABASE_SERVICE_KEY: "${SUPABASE_SERVICE_KEY}"
      # SUPABASE_BUCKET: "${SUPABASE_BUCKET}"
      MINIO_BUCKET: "resumes"
      MINIO_SECURE: "false"
    depends_on:
      - mongo
      - minio

  job_matcher:
    build: ./services/job_matcher
    container_name: jat_job_matcher
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      MONGO_URL: "mongodb://jat_user:jat_pass@mongo:27017/?authSource=admin"
      # MONGO_URL: "${MONGO_URL}"
    depends_on:
      - mongo

  app_manager:
    build: ./services/app_manager
    container_name: jat_app_manager
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      MONGO_URL: "mongodb://jat_user:jat_pass@mongo:27017/?authSource=admin"
      # MONGO_URL: "${MONGO_URL}"
    depends_on:
      - mongo

  api_gateway:
    build: ./services/api_gateway
    container_name: jat_gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGO_URL: "mongodb://jat_user:jat_pass@mongo:27017/?authSource=admin"
      # MONGO_URL: "${MONGO_URL}"
      RESUME_PARSER_URL: "http://resume_parser:8001"
      JOB_MATCHER_URL: "http://job_matcher:8002"
      APP_MANAGER_URL: "http://app_manager:8003"
    depends_on:
      - mongo
      - resume_parser
      - job_matcher
      - app_manager

  frontend:
    build: ./frontend
    container_name: jat_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api_gateway

volumes:
  mongo_data:
  minio_data: